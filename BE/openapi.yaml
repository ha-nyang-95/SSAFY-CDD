openapi: 3.0.0
info:
  title: CrackTrack API
  version: 1.0.0
  description: 균열 탐지 서비스

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: [] # 모든 API 기본 인증 적용 (예외는 아래에서 개별 해제)
  - accessTokenCookie: [] # 쿠키 기반 인증 적용
  - refreshTokenCookie: [] # 쿠키 기반 인증 적용
  
components:
  securitySchemes:
    accessTokenCookie:          # 실제 쿠키 이름과 맞추면 됨
      type: apiKey
      in: cookie
      name: accessToken         # ⇒  Set-Cookie: accessToken=...
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  schemas:
    ApiResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 요청 성공
        code:
          type: integer
          format: int32
          example: 200
        data:
          nullable: true

    # User 관련 스키마
    UserRole:
      type: string
      enum: [GUEST, GENERAL, ADMIN]

    UserResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
        name:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL

    SignUpRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: Password123!
        name:
          type: string
          minLength: 2
          maxLength: 10
          example: 홍길동

    UserUpdateRequestDto:
      type: object
      properties:
        name:
          type: string
          example: ssafy
          
    UserUpdateResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        name:
          type: string
          example: ssafy

    PasswordChangeRequestDto:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
          example: oldPassword123!
        newPassword:
          type: string
          minLength: 8
          example: newPassword123!

    AuthUserInfoDto:          # (구 TokenResponseDto)
      description: |
        로그인·재발급 성공 시 바디로 내려주는 최소 사용자 정보.
        JWT 토큰은 Set-Cookie 헤더로 전달한다.
      type: object
      properties:
        userId: { type: integer, format: int64 }
        email:  { type: string,  format: email }
        name:   { type: string }
        role:   { $ref: '#/components/schemas/UserRole' }


    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: Password123!

    # Drone 관련 스키마
    DroneCreateRequestDto:
      type: object
      properties:
        name:
          type: string
          example: "DJI Mavic 3"
        serialNumber:
          type: string
          example: "SN123456789"

    DroneResponseDto:
      type: object
      properties:
        droneId:
          type: integer
          format: int64
        UserId:
          type: integer
          format: int64
        name:
          type: string
          example: "DJI Mavic 3"
        serialNumber:
          type: string
          example: "SN123456789"

    DronefirstResponseDto:
      type: object
      properties:
        droneId:
          type: integer
          format: int64
        name:
          type: string
          example: "DJI Mavic 3"
        serialNumber:
          type: string
          example: "SN123456789"
        StreamKey(드론):
          type: string
          example: "sk_ap-northeast-2_m50j6P54545S_kvthuEpbvHShOMlAJ4pM8RXURFyX8H"
        StreamEndpoint(드론):
          type: string
          example: "rtmps://ac3c27.global-contribute.live-video.net:443/app/"
        trackingKey:
          type: string
          example: "u01-d01-v01-c000"

    DroneSummaryDto:
      type: object
      properties:
        droneId:
          type: integer
          format: int64
        name:
          type: string
          example: "DJI Mavic 3"

    DroneListResponseDto:
      type: object
      properties:
        drones:
          type: array
          items:
            $ref: "#/components/schemas/DroneSummaryDto"

    # Location 관련 스키마
    LocationRequestDto:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: "서울시 강남구"

    LocationResponseDto:
      type: object
      properties:
        locationId:
          type: integer
          format: int64
        name:
          type: string
          example: "서울시 강남구"

    LocationSummaryDto:
      type: object
      properties:
        locationId:
          type: integer
          format: int64
        name:
          type: string
          example: "서울시 강남구"

    LocationListResponseDto:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationSummaryDto"

    # Video 관련 스키마
    VideoResponseDto:
      type: object
      properties:
        videoId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
          example: 17
        locationId:
          type: integer
          format: int64
          example: 42
        s3Url:
          type: string
          example: "https://s3.amazonaws.com/..."
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"
        
    VideoSummaryResponseDto:
      type: object
      properties:
        videoId:
          type: integer
          format: int64
        s3Url:
            type: string
            example: "https://s3.amazonaws.com/..."
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    VideoListResponseDto:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoSummaryResponseDto"

    # Crack 관련 스키마
    CrackCreateRequestDto:
      type: object
      properties:
        trackingKey:
          type: string
          example: "u01-d01-v01-c001"
        lidarMax:
          type: number
          format: float
          example: 3.25
        lidarMin:
          type: number
          format: float
          example: 0.85
        isCrackDetected:
          type: boolean
          example: true

    CrackUpdateRequestDto:
      type: object
      required:
      - trackingKey
      - s3Url
      properties:
        trackingKey:
          type: string
          description: "균열 이벤트를 식별하는 고유 키 (드론이 파일명 또는 메타데이터로 전달)"
          example: "u01-d01-v01-c001"
        s3Url:
          type: string
          description: "S3에 저장된 이미지의 전체 URL"
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/crack-003.jpg"

    CrackResponseDto:
      type: object
      properties:
        crackId:
          type: integer
          format: int64
        3DModelingId:
          type: integer
          format: int64
        isCrackDetected:
          type: boolean
          example: true
        lidarMax:
          type: number
          format: float
          example: 3.25
        lidarMin:
          type: number
          format: float
          example: 0.85
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/crack-003.jpg"
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DELETED]
        activatedAt:
          type: string
          format: date-time
        deactivatedAt:
          type: string
          format: nullable date-time
        deletedAt:
          type: string
          format: nullable date-time

    CrackListResponseDto:
      type: object
      properties:
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackResponseDto"

    # Mypage 관련 스키마
    MypageResponseDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL
        drones:
          type: array
          items:
            $ref: "#/components/schemas/DroneResponseDto"
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationResponseDto"

    # 3D 모델링 관련 스키마
    3DModelingRequestDto:
      type: object
      properties:
        trackingKey:
          type: string
          example: "u01-d01-v01-c0000"
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"

    3DModelingResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        videoId:
          type: integer
          format: int64
        s3Url:
          type: string 
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        activatedAt:
          type: string
          format: date-time

    3DModelingSummaryResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        s3Url:
          type: string 
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        activatedAt:
          type: string
          format: date-time

    3DModelingListResponseDto:
      type: object
      properties:
        modelings:
          type: array
          items:
            $ref: "#/components/schemas/3DModelingSummaryResponseDto"
    
    # 3D 모델링 상세 조회 스키마
    3DModelingdetailResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        videoId:
          type: integer
          format: int64
        s3Url:
          type: string 
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackListResponseDto"
        video:
          $ref: "#/components/schemas/VideoResponseDto"
        activatedAt:
          type: string
          format: date-time

    # ApiResult 래퍼 스키마들
    ApiResultUserResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserResponseDto"

    ApiResultUserRole:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserRole"


    ApiResultAuthUserInfoDto:
      allOf:
        - $ref: '#/components/schemas/ApiResult'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/AuthUserInfoDto' }

    ApiResultDroneResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DroneResponseDto"

    ApiResultDroneListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DroneListResponseDto"

    ApiResultLocationResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LocationResponseDto"

    ApiResultLocationListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LocationListResponseDto"

    ApiResultVideoResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VideoResponseDto"

    ApiResultVideoListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VideoListResponseDto"

    ApiResultCrackResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CrackResponseDto"

    ApiResultCrackListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CrackListResponseDto"

    ApiResultMypageResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MypageResponseDto"

    ApiResultVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              type: object
              nullable: true

    ApiResultBoolean:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              type: boolean

    ApiResultUserUpdateResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserUpdateResponseDto"

    ApiResultDroneIvsResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DroneResponseDto"

    ApiResultDroneFirstResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DronefirstResponseDto"

    ApiResult3DModelingResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/3DModelingResponseDto"

    ApiResult3DModelingSummaryResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/3DModelingSummaryResponseDto"

    ApiResult3DModelingListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/3DModelingListResponseDto"

    ApiResult3DModelingdetailResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/3DModelingdetailResponseDto"
tags:
  - name: User
    description: 유저 관련 API
  - name: Auth
    description: 인증 관련 API
  - name: Drone
    description: 드론 등록 API
  - name: Location
    description: 유저마다 각자의 리스트로 등록(이전 결과물 추적용)
  - name: Video
    description: 디텍팅 영상 저장, 삭제, 조회
  - name: Crack
    description: 균열 등록 API
  - name: 3D
    description: 3D 모델링 관련 API 

paths:
  # User APIs
  /api/user/role:
    get:
      tags: [User]
      summary: 권한 확인
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUserRole"

  /api/user/mypage:
    get:
      tags: [User]
      summary: 내 정보 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultMypageResponseDto"

  /api/user/update:
    put:
      tags: [User]
      summary: 내 정보 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUserUpdateResponseDto"

  /api/user/password:
    put:
      tags: [User]
      summary: 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  /api/user/delete:
    delete:
      tags: [User]
      summary: 회원 탈퇴
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  /api/user/me:
    get:
      tags: [User]
      summary: 현재 사용자 정보
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUserResponseDto"

  # Auth APIs
  /api/auth/signUp:
    post:
      tags: [Auth]
      summary: 회원 가입
      security: [] # 인증 제외
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      security: [] # 인증 제외
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultAuthUserInfoDto"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      security: [] # 인증 제외
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultAuthUserInfoDto"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  # Drone APIs
  /api/drone/register:
    post:
      tags: [Drone]
      summary: 드론 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DroneCreateRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultDroneFirstResponseDto"

  /api/drone/me:
    get:
      tags: [Drone]
      summary: 드론 전체 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultDroneListResponseDto"

  /api/drone/{droneId}:
    get:
      tags: [Drone]
      summary: 드론 상세 조회
      parameters:
        - name: droneId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultDroneResponseDto"
  
  /api/drone/delete/{droneId}:
    delete:
      tags: [Drone]
      summary: 드론 삭제
      parameters:
        - name: droneId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  # Location APIs
  /api/location/register:
    post:
      tags: [Location]
      summary: 지역 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultLocationResponseDto"

  /api/location/list:
    get:
      tags: [Location]
      summary: 지역 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultLocationListResponseDto"

  /api/location/remove/{locationId}:
    delete:
      tags: [Location]
      summary: 지역 삭제
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVoid"

  # Video APIs
  /api/video/upload/{userId}/{droneId}:
    post:
      tags: [Video]
      summary: (lamdba) 영상 등록
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: droneId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security: [] # 인증 제외
      description: |
        드론 영상 업로드 API입니다.
        사용자는 드론 ID와 사용자 ID를 제공해야 합니다.
        spring boot에서 s3의 s3key를 가져옵니다.
      responses:
        "200":
          description: OK
  
  /api/video/upload/{videoId}:
    put:
      tags: [Video]
      summary: (프론트) 영상에 지역 매핑
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:   
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                locationId:
                  type: integer
                  format: int64
                  example: 42
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultVideoResponseDto"

  /api/video/{videoId}:
    get:
      tags: [Video]
      summary: 영상 조회
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
