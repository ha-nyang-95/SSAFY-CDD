<!DOCTYPE html>
<html>
<head>
    <title>Drone Video Viewer</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: #eee; text-align: center; }
        video { background-color: black; border: 1px solid #444; width: 80%; max-width: 800px; margin-top: 20px; }
        #status { margin-top: 10px; font-size: 1.2em; }
        #controls { margin-top: 20px; }
        button { background-color: #444; color: #eee; border: 1px solid #666; padding: 10px 20px; margin: 5px; cursor: pointer; }
        button:hover { background-color: #555; }
        #debug { margin-top: 20px; font-size: 0.9em; color: #aaa; text-align: left; max-width: 800px; margin: 20px auto; }
    </style>
</head>
<body>
    <h1>Drone Real-time Stream</h1>
    <video id="video" autoplay playsinline muted></video>
    <div id="status">Connecting to server...</div>
    <div id="controls">
        <button onclick="reconnect()">재연결</button>
        <button onclick="clearDebug()">로그 지우기</button>
    </div>
    <div id="debug"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const videoElement = document.getElementById('video');
        const debugDiv = document.getElementById('debug');
        let pc = null;
        let ws = null;
        let reconnectAttempts = 0;
        let isConnecting = false;
        const maxReconnectAttempts = 3;

        function log(message) {
            console.log(message);
            const time = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `[${time}] ${message}<br>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function clearDebug() {
            debugDiv.innerHTML = '';
        }

        function createPeerConnection() {
            const pc_config = {
                "iceServers": [
                    { "urls": "stun:stun.l.google.com:19302" },
                    { "urls": "stun:stun1.l.google.com:19302" }
                ]
            };
            pc = new RTCPeerConnection(pc_config);

            pc.oniceconnectionstatechange = (e) => {
                log(`ICE connection state: ${pc.iceConnectionState}`);
                
                if (pc.iceConnectionState === 'connected') {
                    statusDiv.textContent = 'Connected! Waiting for video...';
                } else if (pc.iceConnectionState === 'checking') {
                    statusDiv.textContent = 'Establishing connection...';
                } else if (pc.iceConnectionState === 'failed') {
                    statusDiv.textContent = 'Connection failed. Trying to reconnect...';
                    log('ICE connection failed, attempting reconnect');
                    setTimeout(() => {
                        if (!isConnecting) {
                            reconnect();
                        }
                    }, 2000);
                }
            };

            pc.onconnectionstatechange = (e) => {
                log(`Connection state: ${pc.connectionState}`);
            };

            pc.ontrack = (event) => {
                log("Video track received!");
                log(`Track kind: ${event.track.kind}, streams: ${event.streams.length}`);
                if (videoElement.srcObject !== event.streams[0]) {
                    videoElement.srcObject = event.streams[0];
                    statusDiv.textContent = 'Streaming live video!';
                    reconnectAttempts = 0; // 성공시 재연결 시도 횟수 리셋
                    log('Video stream attached to video element');
                } else {
                    log('Video stream already attached');
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    log(`Sending ICE candidate: ${event.candidate.type}`);
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'ice_candidate',
                            candidate: event.candidate
                        }));
                    } else {
                        log('WebSocket not ready, cannot send ICE candidate');
                    }
                } else {
                    log('ICE gathering completed');
                }
            };

            pc.onicegatheringstatechange = (e) => {
                log(`ICE gathering state: ${pc.iceGatheringState}`);
            };

            return pc;
        }

        async function connect() {
            if (isConnecting) {
                log('Already connecting, skipping...');
                return;
            }

            if (reconnectAttempts >= maxReconnectAttempts) {
                statusDiv.textContent = `Connection failed after ${maxReconnectAttempts} attempts. Click reconnect to try again.`;
                log(`Max reconnect attempts (${maxReconnectAttempts}) reached`);
                return;
            }

            isConnecting = true;
            log(`Connection attempt ${reconnectAttempts + 1}/${maxReconnectAttempts}`);

            try {
                // 기존 WebSocket 정리
                if (ws) {
                    ws.close();
                    ws = null;
                }

                ws = new WebSocket('ws://127.0.0.1:8765');

                ws.onopen = () => {
                    log('Connected to signaling server');
                    statusDiv.textContent = 'Registering with server...';
                    ws.send(JSON.stringify({ type: 'register', role: 'viewer' }));
                };

                ws.onmessage = async (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        log(`Received: ${message.type}`);

                        if (message.type === 'registered') {
                            statusDiv.textContent = 'Registered. Waiting for drone...';
                            reconnectAttempts = 0; // 등록 성공시 카운터 리셋
                        } else if (message.type === 'drone_ready') {
                            statusDiv.textContent = 'Drone is ready. Starting connection...';
                            startConnection();
                        } else if (message.type === 'offer') {
                            log('Processing offer from drone');
                            log(`Offer SDP length: ${message.sdp ? message.sdp.length : 'undefined'}`);
                            
                            if (!pc) {
                                log('No PeerConnection, creating one');
                                startConnection();
                            }
                            
                            try {
                                await pc.setRemoteDescription(new RTCSessionDescription(message));
                                log('Set remote description (offer) - SUCCESS');
                                
                                const answer = await pc.createAnswer();
                                log('Created answer - SUCCESS');
                                log(`Answer SDP length: ${answer.sdp.length}`);
                                
                                await pc.setLocalDescription(answer);
                                log('Set local description (answer) - SUCCESS');

                                ws.send(JSON.stringify({
                                    type: answer.type,
                                    sdp: answer.sdp
                                }));
                                log('Sent answer to drone - SUCCESS');
                            } catch (error) {
                                log(`ERROR in offer processing: ${error.message}`);
                                console.error('Offer processing error:', error);
                            }

                        } else if (message.type === 'ice_candidate' && message.candidate) {
                            try {
                                await pc.addIceCandidate(message.candidate);
                                log('Added ICE candidate');
                            } catch (e) {
                                log(`Error adding ICE candidate: ${e.message}`);
                            }
                        } else if (message.type === 'error') {
                            log(`Server error: ${message.message}`);
                            statusDiv.textContent = `Error: ${message.message}`;
                            // 에러가 발생하면 연결을 정리하고 재시도
                            setTimeout(() => {
                                if (!isConnecting) {
                                    reconnect();
                                }
                            }, 1000);
                        }
                    } catch (e) {
                        log(`Error processing message: ${e.message}`);
                    }
                };

                ws.onclose = (event) => {
                    isConnecting = false;
                    log(`WebSocket closed: ${event.code} ${event.reason || 'No reason'}`);
                    
                    if (event.code !== 1000 && reconnectAttempts < maxReconnectAttempts) {
                        statusDiv.textContent = `Connection lost. Reconnecting... (${reconnectAttempts + 1}/${maxReconnectAttempts})`;
                        reconnectAttempts++;
                        setTimeout(connect, 3000);
                    } else if (event.code === 1000) {
                        statusDiv.textContent = 'Connection closed normally';
                    } else {
                        statusDiv.textContent = 'Connection failed. Click reconnect to try again.';
                    }
                    
                    if(pc) {
                        pc.close();
                        pc = null;
                    }
                };

                ws.onerror = (err) => {
                    isConnecting = false;
                    log(`WebSocket error: ${err.message || 'Unknown error'}`);
                    statusDiv.textContent = 'Connection error. Retrying...';
                };

            } catch (error) {
                isConnecting = false;
                log(`Connection error: ${error.message}`);
                statusDiv.textContent = 'Connection error. Retrying...';
                reconnectAttempts++;
                if (reconnectAttempts < maxReconnectAttempts) {
                    setTimeout(connect, 3000);
                }
            }
        }
        
        function startConnection() {
            if (!pc) {
                log("Creating PeerConnection");
                pc = createPeerConnection();
            }
        }

        function reconnect() {
            log('Manual reconnect triggered');
            reconnectAttempts = 0;
            isConnecting = false;
            
            if (pc) {
                pc.close();
                pc = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
            videoElement.srcObject = null;
            statusDiv.textContent = 'Reconnecting...';
            setTimeout(connect, 500);
        }

        // 페이지 로드 시 연결 시작
        window.onload = () => {
            log('Page loaded, starting connection');
            connect();
        };
    </script>
</body>
</html>
