spring.application.name=CrackTrack

server.port=8080


# JPA & DB
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cracktrack?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.springframework=info

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Timezone
spring.jackson.time-zone=Asia/Seoul

# API KEY
x.api.key = ${X_API_KEY}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-in-seconds=1800
jwt.refresh-token-validity-in-seconds=604800

# AWS Configuration
cloud.aws.enabled=${AWS_ENABLED:false}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}

# AWS S3 Configuration
cloud.aws.s3.bucket=${AWS_S3_BUCKET:cracktrack}

# AWS IVS Configuration
aws.ivs.enabled=${AWS_IVS_ENABLED:false}
aws.ivs.recording.config.arn = ${AWS_IVS_RECORDING_CONFIG_ARN}
