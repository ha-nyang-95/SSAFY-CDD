openapi: 3.0.0
info:
  title: CDD API
  version: 1.0.0
  description: 균열 탐지 서비스

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: [] # 모든 API 기본 인증 적용 (예외는 아래에서 개별 해제)
  - accessTokenCookie: [] # 쿠키 기반 인증 적용
  - refreshTokenCookie: [] # 쿠키 기반 인증 적용

components:
  securitySchemes:
    accessTokenCookie: # 실제 쿠키 이름과 맞추면 됨
      type: apiKey
      in: cookie
      name: accessToken # ⇒  Set-Cookie: accessToken=...
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    LocationId:
      name: locationId
      in: path
      required: true
      description: 지역 ID
      schema:
        type: integer
        format: int64
    TaskId:
      name: taskId
      in: path
      required: true
      description: 작업 ID
      schema:
        type: integer
        format: int64
    VideoId:
      name: videoId
      in: path
      required: true
      description: 영상 ID
      schema:
        type: integer
        format: int64
    DetectId:
      name: detectId
      in: path
      required: true
      description: 디텍팅 ID
      schema:
        type: integer
        format: int64
    ModelId:
      name: modelId
      in: path
      required: true
      description: 3D 모델링 ID
      schema:
        type: integer
        format: int64
    CrackId:
      name: crackId
      in: path
      required: true
      description: 균열 ID
      schema:
        type: integer
        format: int64

  schemas:
    ApiResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 요청 성공
        code:
          type: integer
          format: int32
          example: 200
        data:
          nullable: true
    # error 관련 스키마
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 인증이 필요합니다.
        code:
          type: integer
          example: 401
        data:
          nullable: true
          example: null

    # User 관련 스키마
    UserRole:
      type: string
      enum: [GENERAL, ADMIN]

    UserResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
        name:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL

    SignUpRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: Password123!
        name:
          type: string
          minLength: 2
          maxLength: 10
          example: 홍길동

    UserUpdateRequestDto:
      type: object
      properties:
        name:
          type: string
          example: ssafy

    UserUpdateResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        name:
          type: string
          example: ssafy

    PasswordChangeRequestDto:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
          example: oldPassword123!
        newPassword:
          type: string
          minLength: 8
          example: newPassword123!

    AuthUserInfoDto:
      description: |
        로그인·재발급 성공 시 바디로 내려주는 최소 사용자 정보.
        JWT 토큰은 Set-Cookie 헤더로 전달한다.
      type: object
      properties:
        userId: { type: integer, format: int64 }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }

    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: Password123!

    # Location 관련 스키마
    LocationRequestDto:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: "서울시 강남구"

    LocationResponseDto:
      type: object
      properties:
        locationId:
          type: integer
          format: int64
        name:
          type: string
          example: "서울시 강남구"

    LocationSummaryDto:
      type: object
      properties:
        locationId:
          type: integer
          format: int64
        name:
          type: string
          example: "서울시 강남구"

    LocationListResponseDto:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationSummaryDto"

    # task 관련 스키마
    TaskFirstResponseDto:
      type: object
      description: 작업 생성 직후 반환되는 정보
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        location:
          type: string
          example: "서울시 강남구"
        s3Name:
          type: string
          example: "1/c8a8f7e4-9e3b-4a2e-8e2a-8e8e8e8e8e8e"

    TaskResponseDto:
      type: object
      description: 작업 목록 조회 시 반환되는 정보
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        location:
          type: string
          example: "서울시 강남구"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    TaskDetailResponseDto:
      type: object
      description: 작업 상세 조회 시 반환되는 정보
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        locationName:
          type: string
          example: "서울시 강남구"
        detectionURL:
          type: string
          example: "https://s3.amazonaws.com/detection-result.jpg"
        modelingURL:
          type: string
          example: "https://s3.amazonaws.com/modeling-result.glb"
        videoURL:
          type: string
          example: "https://s3.amazonaws.com/video-result.mp4"
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackResponseDto"

    TaskListResponseDto:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskResponseDto"

    # Video 관련 스키마
    VideoResponseDto:
      type: object
      properties:
        videoId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://s3.amazonaws.com/..."
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    VideoListResponseDto:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoResponseDto"

    # Detecting 관련 스키마
    DetectingResponseDto:
      type: object
      properties:
        detectId:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://s3.amazonaws.com/..."
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    DetectingSummaryResponseDto:
      type: object
      properties:
        detectId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://s3.amazonaws.com/..."
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    DetectingListResponseDto:
      type: object
      properties:
        detectings:
          type: array
          items:
            $ref: "#/components/schemas/DetectingSummaryResponseDto"
    # Segment 관련 스키마
    SegmentResponseDto:
      type: object
      properties:
        segmentId:
          type: integer
          format: int64
        crackId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://s3.amazonaws.com/segment-001.jpg"
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    SegmentSummaryResponseDto:
      type: object
      properties:
        segmentId:
          type: integer
          format: int64
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"
        s3Url:
          type: string
          description: S3 저장 경로
          example: "https://s3.amazonaws.com/lidar-001.pcd"

    SegmentListResponseDto:
      type: object
      properties:
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentSummaryResponseDto"

    # lidar 관련 스키마
    LidarResponseDto:
      type: object
      properties:
        lidarId:
          type: integer
          format: int64
          description: 라이더ID
        crackId:
          type: integer
          format: int64
          description: 균열ID
        s3Url:
          type: string
          description: S3 저장 경로(라이더 파일 URL)
          example: "https://s3.amazonaws.com/lidar-001.pcd"
        status:
          type: string
          enum: [ ACTIVE, INACTIVE, DELETED ]
          example: ACTIVE
        activatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    LidarSummaryResponseDto:
      type: object
      properties:
        lidarId:
          type: integer
          format: int64
          description: 라이더ID
        crackId:
          type: integer
          format: int64
          description: 균열ID
        s3Url:
          type: string
          description: S3 저장 경로(라이더 파일 URL)
          example: "https://s3.amazonaws.com/lidar-001.pcd"
        status:
          type: string
          enum: [ ACTIVE, INACTIVE, DELETED ]
          example: ACTIVE


    # Crack 관련 스키마
    CrackUpdateRequestDto:
      type: object
      required:
        - trackingKey
        - s3Url
      properties:
        trackingKey:
          type: string
          description: "균열 이벤트를 식별하는 고유 키 (드론이 파일명 또는 메타데이터로 전달)"
          example: "u01-d01-v01-c001"
        s3Url:
          type: string
          description: "S3에 저장된 이미지의 전체 URL"
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/crack-003.jpg"

    CrackResponseDto:
      type: object
      properties:
        crackId:
          type: integer
          format: int64
        modelingId:
          type: integer
          format: int64
        isCrackDetected:
          type: boolean
          example: true
        status:
          type: string
          enum: [ ACTIVE, INACTIVE, DELETED ]
        activatedAt:
          type: string
          format: date-time
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true

    CrackDetailResponseDto:
      type: object
      properties:
        Crack:
          type: object
          $ref: "#/components/schemas/CrackResponseDto"
        Segment:
          type: object
          $ref: "#/components/schemas/SegmentResponseDto"
        Lidar:
          type: object
          $ref: "#/components/schemas/LidarResponseDto"

    CrackListResponseDto:
      type: object
      properties:
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackResponseDto"

    # Mypage 관련 스키마
    MypageResponseDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskListResponseDto"
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationResponseDto"
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoListResponseDto"
        detectings:
          type: array
          items:
            $ref: "#/components/schemas/DetectingListResponseDto"
        modelings:
          type: array
          items:
            $ref: "#/components/schemas/ModelingSummaryResponseDto"
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackListResponseDto"




    # 3D 모델링 관련 스키마
    ModelingRequestDto:
      type: object
      properties:
        trackingKey:
          type: string
          example: "u01-d01-v01-c0000"
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"

    ModelingResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        videoId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        activatedAt:
          type: string
          format: date-time

    ModelingSummaryResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        activatedAt:
          type: string
          format: date-time

    ModelingListResponseDto:
      type: object
      properties:
        modelings:
          type: array
          items:
            $ref: "#/components/schemas/ModelingSummaryResponseDto"

    # 3D 모델링 상세 조회 스키마
    ModelingDetailResponseDto:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        videoId:
          type: integer
          format: int64
        s3Url:
          type: string
          example: "https://your-bucket.s3.ap-northeast-2.amazonaws.com/user01/drone01/modeling-001.glb"
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackListResponseDto"
        # video:
        #   $ref: "#/components/schemas/VideoResponseDto"
        activatedAt:
          type: string
          format: date-time

    # ApiResult 래퍼 스키마들
    ApiResultUserResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserResponseDto"

    ApiResultUserRole:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserRole"

    ApiResultAuthUserInfoDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/AuthUserInfoDto" }

    ApiResultLocationResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LocationResponseDto"

    ApiResultLocationListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LocationListResponseDto"

    ApiResultVideoListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VideoListResponseDto"

    ApiResultCrackResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CrackResponseDto"

    ApiResultCrackListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CrackListResponseDto"

    ApiResultMypageResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MypageResponseDto"

    ApiResultVideoResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VideoResponseDto"

    ApiResultDetectingResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DetectingResponseDto"

    ApiResultDetectingListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DetectingListResponseDto"

    ApiResultSegmentResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SegmentResponseDto"

    ApiResultSegmentListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SegmentListResponseDto"

    ApiResultVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              type: object
              nullable: true

    ApiResultBoolean:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              type: boolean

    ApiResultUserUpdateResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserUpdateResponseDto"

    ApiResultTaskFirstResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TaskFirstResponseDto"

    ApiResultTaskListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TaskListResponseDto"

    ApiResultTaskDetailResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TaskDetailResponseDto"

    ApiResult3DModelingResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ModelingResponseDto"

    ApiResult3DModelingSummaryResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ModelingSummaryResponseDto"

    ApiResult3DModelingListResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ModelingListResponseDto"

    ApiResult3DModelingDetailResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ModelingDetailResponseDto"



    ApiResultCrackDetailResponseDto:
      allOf:
        - $ref: "#/components/schemas/ApiResult"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CrackDetailResponseDto"

  responses:
    BadRequest:
      description: 잘못된 요청(입력값 오류 등)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            message: "요청 파라미터가 올바르지 않습니다."
            code: 400
            data: null
    Unauthorized:
      description: 인증 실패(로그인 필요 등)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            message: "인증이 필요합니다."
            code: 401
            data: null
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            message: "권한이 없습니다."
            code: 403
            data: null
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            message: "해당 리소스를 찾을 수 없습니다."
            code: 404
            data: null
    InternalError:
      description: 서버 에러
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            message: "알 수 없는 서버 오류가 발생했습니다."
            code: 500
            data: null


tags:
  - name: User
    description: 유저 관련 API
  - name: Auth
    description: 인증 관련 API
  - name: Location
    description: 지역 관련 API
  - name: Task
    description: 작업 관련 API
  - name: Video
    description: 영상 관련 API
  - name: Detecting
    description: 디텍팅 관련 API
  - name: 3DModeling
    description: 3D 모델링 관련 API
  - name: Crack
    description: 균열 관련 API
  - name: Segment
    description: 세그먼트 관련 API
  - name: Lidar
    description: 라이더 관련 API
paths:
  # User APIs
  /api/user/role:
    get:
      tags: [User]
      summary: 권한 확인
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultUserRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/user/mypage:
    get:
      tags: [User]
      summary: 내 정보 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResultMypageResponseDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
