services:
  db:
    image: mysql:8.0
    container_name: cracktrack-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: b102b102
      MYSQL_DATABASE: cracktrack
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
