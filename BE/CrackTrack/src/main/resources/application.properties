spring.application.name=CrackTrack

server.port=8080

# H2
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JPA & DB
spring.datasource.url=jdbc:mysql://localhost:3306/cracktrack?serverTimezone=Asia/Seoul
#spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cracktrack?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.springframework=info

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Timezone
spring.jackson.time-zone=Asia/Seoul

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-in-seconds=1800
jwt.refresh-token-validity-in-seconds=604800
