# docker 프로파일 설정 (환경변수 없이 동작)

server.port=8080

# DB 연결: docker compose의 mysql 서비스 호스트명은 `db`
spring.datasource.url=jdbc:mysql://db:3306/cracktrack?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 로깅 레벨 설정 (배포 환경)
logging.level.com.b102.cracktrack=WARN
logging.level.root=WARN

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT (ENV 우선, 기본값 제공)
jwt.secret=${JWT_SECRET:}
jwt.access-token-validity-in-seconds=1800
jwt.refresh-token-validity-in-seconds=604800

# AWS 설정 (ENV 우선, 기본값 제공)
cloud.aws.enabled=${AWS_ENABLED:false}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
aws.ivs.enabled=${AWS_IVS_ENABLED:false}
aws.ivs.recording.config.arn=${AWS_IVS_RECORDING_CONFIG_ARN:}


