version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: cracktrack-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cracktrack}
      MYSQL_USER: ${MYSQL_USER:-crackuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crackpass}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./BE/CrackTrack/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ./BE/CrackTrack
      dockerfile: Dockerfile
    container_name: cracktrack-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-crackuser}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-crackpass}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-0123456789-abcdefghijklmnopqrstuvwxyz-ABCDEFGHIJKLMNOPQRSTUVWXYZ}
    restart: unless-stopped

  web:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: cdd-frontend
    depends_on:
      - app
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql_data:


