openapi: 3.0.0
info:
  title: CDD API
  version: 1.0.0
  description: 균열 탐지 서비스

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []
  - accessTokenCookie: []
  - refreshTokenCookie: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: accessToken
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    LocationId:
      name: locationId
      in: path
      required: true
      description: 지역 ID
      schema:
        type: integer
        format: int64
    TaskId:
      name: taskId
      in: path
      required: true
      description: 작업 ID
      schema:
        type: integer
        format: int64
    CrackId:
      name: crackId
      in: path
      required: true
      description: 균열 ID
      schema:
        type: integer
        format: int64

  schemas:
    ApiResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 요청 성공
        code:
          type: integer
          format: int32
          example: 200
        data:
          nullable: true

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 인증이 필요합니다.
        code:
          type: integer
          example: 401
        data:
          nullable: true
          example: null

    # User 관련 스키마
    UserResponseDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
        username:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL

    UserPrincipal:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
        username:
          type: string
          example: 홍길동
        role:
          type: string
          example: GENERAL

    SignUpRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: Password123!
        name:
          type: string
          minLength: 2
          maxLength: 10
          example: 홍길동

    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: Password123!

    TokenResponseDto:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userInfo:
          $ref: "#/components/schemas/UserResponseDto"

    UserUpdateRequestDto:
      type: object
      properties:
        username:
          type: string
          example: ssafy

    PasswordChangeRequestDto:
      type: object
      properties:
        oldPassword:
          type: string
          minLength: 8
          example: oldPassword123!
        newPassword:
          type: string
          minLength: 8
          example: newPassword123!

    # Location 관련 스키마
    LocationRequestDto:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          example: "서울시 강남구"

    LocationResponseDto:
      type: object
      properties:
        locationId:
          type: integer
          format: int64
        name:
          type: string
          example: "서울시 강남구"

    # Task 관련 스키마
    TaskFirstResponseDto:
      type: object
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        location:
          type: string
          example: "서울시 강남구"
        s3Name:
          type: string
          example: "1/c8a8f7e4-9e3b-4a2e-8e2a-8e8e8e8e8e8e"

    TaskResponseDto:
      type: object
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        location:
          type: string
          example: "서울시 강남구"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00"

    TaskDetailResponseDto:
      type: object
      properties:
        taskId:
          type: integer
          format: int64
          example: 1
        locationName:
          type: string
          example: "서울시 강남구"
        detectionURL:
          type: string
          example: "https://s3.amazonaws.com/detection-result.jpg"
        modelingURL:
          type: string
          example: "https://s3.amazonaws.com/modeling-result.glb"
        videoURL:
          type: string
          example: "https://s3.amazonaws.com/video-result.mp4"
        cracks:
          type: array
          items:
            $ref: "#/components/schemas/CrackResponseDto"

    # Crack 관련 스키마
    CrackResponseDto:
      type: object
      properties:
        crackId:
          type: integer
          format: int64
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DELETED]
        activatedAt:
          type: string
          format: date-time
        deactivatedAt:
          type: string
          format: date-time
          nullable: true

    # Lambda 관련 스키마
    LambdaEventRequestDto:
      type: object
      properties:
        uuid:
          type: string
          example: "u1/2025-08-08/4f3685fe-cdd6-43c2-a5c3-7e6c9ddea4f9"
        files:
          type: array
          items:
            type: string
          example: ["raw_video001.mp4", "detected_video001.mp4", "crackId001/image.jpg"]
        metadata:
          type: string
          example: '{"additional": "metadata"}'

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: 서버 에러
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

tags:
  - name: Auth
    description: 인증 관련 API
  - name: User
    description: 유저 관련 API
  - name: Location
    description: 지역 관련 API
  - name: Task
    description: 작업 관련 API
  - name: Crack
    description: 균열 관련 API
  - name: Lambda
    description: AWS Lambda 이벤트 처리 API

paths:
  # Auth APIs
  /api/auth/signUp:
    post:
      tags: [Auth]
      summary: 회원 가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/check-email:
    get:
      tags: [Auth]
      summary: 이메일 사용 가능 여부 확인
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
          example: test@example.com
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # User APIs
  /api/user/mypage:
    get:
      tags: [User]
      summary: 내 정보 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponseDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/user/me:
    get:
      tags: [User]
      summary: 현재 사용자 정보
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserPrincipal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/user/role:
    get:
      tags: [User]
      summary: 권한 확인
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: string
                        example: "GENERAL"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/user/update:
    put:
      tags: [User]
      summary: 사용자 정보 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/user/password:
    put:
      tags: [User]
      summary: 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # Location APIs
  /api/location/register:
    post:
      tags: [Location]
      summary: 지역 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LocationResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/location/remove/{locationId}:
    delete:
      tags: [Location]
      summary: 지역 삭제
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/location/list:
    get:
      tags: [Location]
      summary: 지역 목록 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LocationResponseDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # Task APIs
  /api/tasks/{locationId}:
    post:
      tags: [Task]
      summary: 작업 생성
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TaskFirstResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/task/{taskId}:
    get:
      tags: [Task]
      summary: 작업 상세 조회
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TaskDetailResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Task]
      summary: 작업 삭제
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tasks/location/{locationId}:
    get:
      tags: [Task]
      summary: 지역별 작업 목록 조회
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TaskResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tasks:
    get:
      tags: [Task]
      summary: 전체 작업 목록 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TaskResponseDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # Crack APIs
  /api/cracks/task/{taskId}:
    get:
      tags: [Crack]
      summary: 작업별 균열 목록 조회
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CrackResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/cracks/{crackId}:
    get:
      tags: [Crack]
      summary: 균열 상세 조회
      parameters:
        - $ref: "#/components/parameters/CrackId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CrackResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Crack]
      summary: 균열 검사
      description: 균열에 대해 이미 인지하고 있거나 관리했다는 마킹
      parameters:
        - $ref: "#/components/parameters/CrackId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CrackResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Crack]
      summary: 균열 삭제
      parameters:
        - $ref: "#/components/parameters/CrackId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # Lambda APIs
  /api/lambda/event:
    post:
      tags: [Lambda]
      summary: Lambda 이벤트 처리
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LambdaEventRequestDto"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResult"
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"